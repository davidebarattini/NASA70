<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NASA70 — Connections</title>
  <link rel="stylesheet" href="css/main.css?v=open-red-explore">
</head>
<body class="page-top10">
  <header class="site-header site-header--scheda">
    <div class="site-header__start">
      <a class="header__back" href="index.html" aria-label="Torna alla Home">
        <svg viewBox="0 0 24 24" fill="none" focusable="false" aria-hidden="true"><path d="M19 12H5M11 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <nav class="site-nav" aria-label="Sezioni">
        <a class="site-nav__link" href="projects.html">Project List</a>
        <a class="site-nav__link site-nav__link--active" href="explore.html" aria-current="page">Connections</a>
      </nav>
    </div>
    <button type="button" class="header__menuButton" id="legend-toggle" aria-label="Apri menu" aria-controls="legend-panel" aria-expanded="false">
      <span class="header__menuIcon" aria-hidden="true"></span>
    </button>
    <p class="header-meta" aria-hidden="true"><span id="coord-readout" class="mono"></span></p>
  </header>

  <div class="top10-shell" id="top10-shell">
    <div class="top10-graph-pane" id="top10-graph-pane">
      <aside class="legend" id="legend-panel" aria-label="Legenda colori"></aside>
      <main class="main-stage" id="main-stage">
        <canvas id="starfield" class="starfield" aria-hidden="true"></canvas>
        <svg id="graph-svg" class="graph-svg" role="application" aria-label="Rete interattiva dei progetti del corso">
          <defs>
            <filter id="node-glow" x="-80%" y="-80%" width="260%" height="260%">
              <feGaussianBlur stdDeviation="1.8" result="b"/>
              <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <g id="zoom-layer">
            <g id="links-layer"></g>
            <g id="nodes-layer"></g>
            <g id="links-highlight-layer"></g>
          </g>
        </svg>
      </main>
      <nav class="filters" id="filter-bar" aria-label="Filtra per tag"></nav>
    </div>

    <aside class="top10-preview-pane" id="preview-pane" aria-label="Anteprima progetto">
      <div class="top10-preview-pane__inner" id="preview-inner">
        <p class="top10-preview__empty">Select a project to preview</p>
      </div>
    </aside>
  </div>

  <div id="mobile-peek" class="mobile-peek" hidden aria-live="polite"></div>

  <div id="tooltip" class="tooltip" role="tooltip" hidden></div>

  <div id="modal" class="modal" hidden aria-modal="true" role="dialog" aria-labelledby="modal-title">
    <div class="modal__backdrop" data-modal-close></div>
    <div class="modal__panel">
      <div class="modal__inner" id="modal-inner"></div>
    </div>
  </div>

  <script type="module" src="js/main.js?v=close-outside-fix"></script>
</body>
</html>
